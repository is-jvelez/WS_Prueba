# Configuración base de Flyway para IS_WS_PRUEBA.
# Los valores de conexión reales se inyectan por variables de entorno en docker-compose
# (FLYWAY_URL, FLYWAY_USER, FLYWAY_PASSWORD) y sobrescriben lo definido aquí.
flyway.locations=filesystem:/flyway/sql
flyway.sqlMigrationPrefix=V
flyway.sqlMigrationSeparator=__
flyway.sqlMigrationSuffixes=.sql
flyway.baselineOnMigrate=true
flyway.baselineVersion=0
flyway.validateOnMigrate=true
flyway.connectRetries=10
